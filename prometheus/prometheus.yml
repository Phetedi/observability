global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'prometheus:9090'


  - job_name: 'grafana'
    static_configs:
      - targets:
          - 'grafana:3000'

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'node-exporter:9100'

  - job_name: 'springboot-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
        - 'observability-api:8080'

  - job_name: 'windows-vms'
    static_configs:
      - targets:
          - '192.168.0.121:9182'
